<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Derivatives → Integrals</title>

<!-- PWA metadata -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#10172A" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
  html, body { margin: 0; padding: 0; background: #10172A; }
  #root { min-height: 100vh; }
  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #3D4A66;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #E8A33D;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #E8A33D;
    border: none;
    cursor: pointer;
  }
  * { box-sizing: border-box; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback } = React;

// ---------- Math helpers ----------
const FUNCS = {
  quad: { fn: x => x * x, d: x => 2 * x, label: "f(x) = x²", domain: [-3, 3] },
  cubic: { fn: x => 0.3 * x * x * x, d: x => 0.9 * x * x, label: "f(x) = 0.3x³", domain: [-3, 3] },
  sin: { fn: x => 2 * Math.sin(x), d: x => 2 * Math.cos(x), label: "f(x) = 2sin(x)", domain: [-6, 6] },
  cube2: { fn: x => 0.15 * x * x * x - x, d: x => 0.45 * x * x - 1, label: "f(x) = 0.15x³ − x", domain: [-4, 4] },
};

function useCanvasGraph(funcKey, mode) {
  const canvasRef = useRef(null);
  const [t, setT] = useState(1.2);
  const dragging = useRef(false);
  const dims = { w: 320, h: 320, pad: 28 };

  const toPx = useCallback((x, y, domain) => {
    const [lo, hi] = domain;
    const range = hi - lo;
    const scale = (dims.w - dims.pad * 2) / range;
    const px = dims.pad + (x - lo) * scale;
    const py = dims.h / 2 - y * scale;
    return [px, py];
  }, []);

  const toMath = useCallback((px, domain) => {
    const [lo, hi] = domain;
    const range = hi - lo;
    const scale = (dims.w - dims.pad * 2) / range;
    return lo + (px - dims.pad) / scale;
  }, []);

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const { fn, d, domain } = FUNCS[funcKey];
    ctx.clearRect(0, 0, dims.w, dims.h);

    ctx.strokeStyle = "#3D4A66";
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.35;
    for (let gx = Math.ceil(domain[0]); gx <= domain[1]; gx++) {
      const [px] = toPx(gx, 0, domain);
      ctx.beginPath();
      ctx.moveTo(px, 0);
      ctx.lineTo(px, dims.h);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = "#5C6A8C";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(dims.pad, dims.h / 2);
    ctx.lineTo(dims.w - dims.pad, dims.h / 2);
    const [zx] = toPx(0, 0, domain);
    ctx.moveTo(zx, 0);
    ctx.lineTo(zx, dims.h);
    ctx.stroke();

    ctx.strokeStyle = "#F2EFE6";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const steps = 200;
    for (let i = 0; i <= steps; i++) {
      const x = domain[0] + (i / steps) * (domain[1] - domain[0]);
      const y = fn(x);
      const [px, py] = toPx(x, y, domain);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();

    if (mode === "tangent") {
      const slope = d(t);
      const y0 = fn(t);
      const x1 = t - 1.4, x2 = t + 1.4;
      const y1 = y0 + slope * (x1 - t), y2 = y0 + slope * (x2 - t);
      const [px1, py1] = toPx(x1, y1, domain);
      const [px2, py2] = toPx(x2, y2, domain);
      ctx.strokeStyle = "#E8A33D";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(px1, py1);
      ctx.lineTo(px2, py2);
      ctx.stroke();

      const [ptx, pty] = toPx(t, y0, domain);
      ctx.fillStyle = "#E8A33D";
      ctx.beginPath();
      ctx.arc(ptx, pty, 5.5, 0, Math.PI * 2);
      ctx.fill();
    }

    if (mode === "area") {
      const n = Math.round(t);
      const [aLo, aHi] = [domain[0] + 0.5, domain[1] - 0.5];
      const width = (aHi - aLo) / n;
      ctx.fillStyle = "rgba(232,163,61,0.45)";
      for (let i = 0; i < n; i++) {
        const xL = aLo + i * width;
        const xR = xL + width;
        const height = fn(xL + width / 2);
        const [pxL] = toPx(xL, 0, domain);
        const [pxR] = toPx(xR, 0, domain);
        const [, pyTop] = toPx(0, height, domain);
        const [, pyBase] = toPx(0, 0, domain);
        ctx.fillRect(pxL, Math.min(pyTop, pyBase), pxR - pxL - 1, Math.abs(pyBase - pyTop));
      }
      ctx.strokeStyle = "#E8A33D";
      ctx.lineWidth = 1;
      for (let i = 0; i <= n; i++) {
        const xL = aLo + i * width;
        const [pxL] = toPx(xL, 0, domain);
        ctx.beginPath();
        ctx.moveTo(pxL, 0);
        ctx.lineTo(pxL, dims.h);
        ctx.globalAlpha = 0.25;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }, [funcKey, mode, t, toPx]);

  useEffect(() => { draw(); }, [draw]);

  const handlePointer = useCallback((e) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const px = (clientX - rect.left) * (dims.w / rect.width);
    const { domain } = FUNCS[funcKey];
    if (mode === "tangent") {
      let x = toMath(px, domain);
      x = Math.max(domain[0] + 0.3, Math.min(domain[1] - 0.3, x));
      setT(x);
    }
  }, [funcKey, mode, toMath]);

  return { canvasRef, dims, t, setT, handlePointer, dragging };
}

function TangentGraph({ funcKey }) {
  const { canvasRef, dims, t, handlePointer, dragging } = useCanvasGraph(funcKey, "tangent");
  const { d } = FUNCS[funcKey];
  const slope = d(t);

  return (
    <div className="flex flex-col items-center gap-3">
      <canvas
        ref={canvasRef}
        width={dims.w}
        height={dims.h}
        className="rounded-lg cursor-pointer touch-none"
        style={{ background: "#0D1322", border: "1px solid #2A3550", maxWidth: "100%" }}
        onMouseDown={(e) => { dragging.current = true; handlePointer(e); }}
        onMouseMove={(e) => { if (dragging.current) handlePointer(e); }}
        onMouseUp={() => { dragging.current = false; }}
        onMouseLeave={() => { dragging.current = false; }}
        onTouchStart={(e) => { dragging.current = true; handlePointer(e); }}
        onTouchMove={(e) => { if (dragging.current) handlePointer(e); }}
        onTouchEnd={() => { dragging.current = false; }}
      />
      <div className="text-center">
        <p className="text-xs tracking-wide uppercase" style={{ color: "#8C9AC2" }}>drag the point along the curve</p>
        <p className="font-mono text-sm mt-1" style={{ color: "#F2EFE6" }}>
          x = {t.toFixed(2)} &nbsp;→&nbsp; <span style={{ color: "#E8A33D" }}>slope = {slope.toFixed(2)}</span>
        </p>
      </div>
    </div>
  );
}

function AreaGraph({ funcKey }) {
  const { canvasRef, dims, t, setT } = useCanvasGraph(funcKey, "area");
  const n = Math.round(t);

  return (
    <div className="flex flex-col items-center gap-3">
      <canvas
        ref={canvasRef}
        width={dims.w}
        height={dims.h}
        className="rounded-lg touch-none"
        style={{ background: "#0D1322", border: "1px solid #2A3550", maxWidth: "100%" }}
      />
      <div className="w-full max-w-xs flex flex-col items-center gap-1">
        <input
          type="range"
          min={2}
          max={40}
          value={n}
          onChange={(e) => setT(Number(e.target.value))}
          className="w-full"
        />
        <p className="text-xs tracking-wide uppercase" style={{ color: "#8C9AC2" }}>more rectangles → closer to true area</p>
        <p className="font-mono text-sm" style={{ color: "#F2EFE6" }}>
          n = <span style={{ color: "#E8A33D" }}>{n}</span> rectangles
        </p>
      </div>
    </div>
  );
}

// ---------- Problem data ----------
const DAYS = [
  {
    id: 1,
    title: "Derivative Rules, Locked In",
    eyebrow: "Day 1 — Foundations",
    recap: "The derivative is the instantaneous rate of change — the slope of the tangent line at a point. Power rule: d/dx[xⁿ] = nxⁿ⁻¹. Constants drop out when added, but multiply through when scaling.",
    graphMode: "tangent",
    func: "quad",
    problems: [
      { q: "d/dx [x⁴]", a: "4x^3", hint: "Power rule: bring the exponent down, subtract 1 from it." },
      { q: "d/dx [7x³]", a: "21x^2", hint: "Multiply the coefficient by the exponent first." },
      { q: "d/dx [5x − 9]", a: "5", hint: "The derivative of a constant is always 0." },
      { q: "d/dx [x^(1/2)]", a: "(1/2)x^(-1/2)", hint: "Same power rule works for fractional exponents." },
    ],
  },
  {
    id: 2,
    title: "Product & Quotient Rules",
    eyebrow: "Day 2 — Combining Functions",
    recap: "Product rule: d/dx[uv] = u'v + uv'. Quotient rule: d/dx[u/v] = (u'v − uv')/v². Mnemonic for quotient: \"low d-high minus high d-low, over low-low.\"",
    graphMode: "tangent",
    func: "cubic",
    problems: [
      { q: "d/dx [x² · sin(x)] — write in terms of x, sin, cos", a: "2x*sin(x)+x^2*cos(x)", hint: "u = x², v = sin(x). Apply u'v + uv'." },
      { q: "d/dx [(x²+1)(x−3)] — expand or use product rule, simplify to a polynomial", a: "3x^2-6x+1", hint: "Try expanding first: x³ −3x² + x − 3, then differentiate term by term." },
      { q: "d/dx [x / (x+1)]", a: "1/(x+1)^2", hint: "u = x, v = x+1. u'=1, v'=1. Apply quotient rule and simplify." },
    ],
  },
  {
    id: 3,
    title: "Chain Rule Mastery",
    eyebrow: "Day 3 — The Inside-Out Rule",
    recap: "Chain rule: d/dx[f(g(x))] = f'(g(x)) · g'(x). Differentiate the outside function, leave the inside alone, then multiply by the derivative of the inside.",
    graphMode: "tangent",
    func: "sin",
    problems: [
      { q: "d/dx [(3x+1)^5]", a: "15(3x+1)^4", hint: "Outside: u^5 → 5u^4. Inside: 3x+1 → derivative 3. Multiply." },
      { q: "d/dx [sin(4x)]", a: "4cos(4x)", hint: "Outside: sin(u) → cos(u). Inside: 4x → derivative 4." },
      { q: "d/dx [(x²+3)^3]", a: "6x(x^2+3)^2", hint: "Outside: u^3 → 3u^2. Inside: x²+3 → derivative 2x." },
      { q: "d/dx [e^(2x)]", a: "2e^(2x)", hint: "Outside: e^u → e^u. Inside: 2x → derivative 2." },
    ],
  },
  {
    id: 4,
    title: "Applications: Max, Min & Motion",
    eyebrow: "Day 4 — Using Derivatives",
    recap: "Critical points occur where f'(x) = 0 or is undefined. f' > 0 means increasing, f' < 0 means decreasing. f'' tells you concavity — and if position is s(t), velocity is s'(t), acceleration is s''(t).",
    graphMode: "tangent",
    func: "cube2",
    problems: [
      { q: "Find critical points of f(x) = x² − 4x + 3 (give x-values, comma separated)", a: "2", hint: "Set f'(x) = 2x − 4 = 0 and solve." },
      { q: "s(t) = t³ − 6t² + 9t. Find velocity v(t)", a: "3t^2-12t+9", hint: "Velocity is the derivative of position." },
      { q: "Using the f(x) above, is the function increasing or decreasing at x = 5? (type: increasing or decreasing)", a: "increasing", hint: "Plug x=5 into f'(x) = 2x − 4. If positive, increasing." },
    ],
  },
  {
    id: 5,
    title: "Crossing Over: What Is an Integral?",
    eyebrow: "Day 5 — Integration Begins",
    recap: "An integral is the reverse of a derivative — it accumulates area under a curve. The Riemann sum approximates this area with rectangles; as the number of rectangles → ∞, the sum becomes exact. This is the foundation of ∫f(x)dx.",
    graphMode: "area",
    func: "quad",
    problems: [
      { q: "If F'(x) = 6x², what is one possible F(x)?", a: "2x^3", hint: "Reverse the power rule: raise the exponent by 1, divide by the new exponent." },
      { q: "∫ 1 dx = ?", a: "x", hint: "What function has a derivative of exactly 1?" },
      { q: "True or false: every function has exactly one antiderivative (type: true or false)", a: "false", hint: "Think about the '+C' — constants vanish when you differentiate, so there are infinitely many." },
    ],
  },
  {
    id: 6,
    title: "Antiderivative Rules",
    eyebrow: "Day 6 — Reverse Power Rule & +C",
    recap: "Reverse power rule: ∫xⁿ dx = xⁿ⁺¹/(n+1) + C, for n ≠ −1. Always add the constant of integration C for indefinite integrals — it represents the family of all antiderivatives.",
    graphMode: "area",
    func: "cubic",
    problems: [
      { q: "∫ x³ dx", a: "x^4/4+C", hint: "Add 1 to the exponent, divide by the new exponent, plus C." },
      { q: "∫ (4x + 1) dx", a: "2x^2+x+C", hint: "Integrate term by term." },
      { q: "∫ 6 dx", a: "6x+C", hint: "Think: what's the antiderivative of a constant by itself?" },
      { q: "∫ x^(-2) dx", a: "-x^(-1)+C", hint: "Reverse power rule still applies: add 1 to -2 → -1, divide by -1." },
    ],
  },
  {
    id: 7,
    title: "The Fundamental Theorem & Definite Integrals",
    eyebrow: "Day 7 — Tying It Together",
    recap: "The Fundamental Theorem of Calculus links the two halves of this week: ∫ₐᵇ f(x)dx = F(b) − F(a), where F is any antiderivative of f. This number is the exact, signed area under f(x) between a and b.",
    graphMode: "area",
    func: "cube2",
    problems: [
      { q: "∫₀² 2x dx — evaluate to a number", a: "4", hint: "Antiderivative is x². Evaluate F(2) − F(0)." },
      { q: "∫₁³ 3 dx — evaluate to a number", a: "6", hint: "Antiderivative is 3x. Evaluate F(3) − F(1)." },
      { q: "∫₀¹ x² dx — evaluate to a number (use a fraction or decimal)", a: "1/3", hint: "Antiderivative is x³/3. Evaluate F(1) − F(0)." },
    ],
  },
];

function normalize(s) {
  return s
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/\*\*/g, "^")
    .replace(/\u2212/g, "-")
    .replace(/×/g, "*")
    .replace(/π/g, "pi");
}

function checkAnswer(input, answer) {
  const a = normalize(input);
  const b = normalize(answer);
  if (a === b) return true;
  const altMap = { "1/3": ["0.33", "0.333", "0.3333"], "true": ["t"], "false": ["f"] };
  if (altMap[b] && altMap[b].includes(a)) return true;
  return false;
}

function ProblemCard({ problem, index }) {
  const [value, setValue] = useState("");
  const [status, setStatus] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [attempts, setAttempts] = useState(0);

  const submit = () => {
    if (!value.trim()) return;
    const ok = checkAnswer(value, problem.a);
    setStatus(ok ? "correct" : "incorrect");
    setAttempts((n) => n + 1);
  };

  return (
    <div
      className="rounded-lg p-4 flex flex-col gap-3"
      style={{ background: "#161E33", border: "1px solid #2A3550" }}
    >
      <div className="flex items-start gap-3">
        <span
          className="font-mono text-xs rounded-full w-6 h-6 flex items-center justify-center flex-shrink-0 mt-0.5"
          style={{ background: "#2A3550", color: "#8C9AC2" }}
        >
          {index + 1}
        </span>
        <p className="font-mono text-sm leading-relaxed" style={{ color: "#F2EFE6" }}>
          {problem.q}
        </p>
      </div>

      <div className="flex gap-2 items-center pl-9">
        <input
          type="text"
          value={value}
          onChange={(e) => { setValue(e.target.value); setStatus(null); }}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          placeholder="type your answer…"
          className="flex-1 rounded px-3 py-2 text-sm font-mono outline-none"
          style={{
            background: "#0D1322",
            color: "#F2EFE6",
            border: `1px solid ${status === "correct" ? "#5FAD7D" : status === "incorrect" ? "#C75C5C" : "#3D4A66"}`,
          }}
        />
        <button
          onClick={submit}
          className="text-xs font-semibold uppercase tracking-wide rounded px-3 py-2 flex-shrink-0"
          style={{ background: "#E8A33D", color: "#10172A" }}
        >
          Check
        </button>
      </div>

      {status === "correct" && (
        <p className="text-sm pl-9" style={{ color: "#5FAD7D" }}>✓ Correct — nice work.</p>
      )}
      {status === "incorrect" && (
        <div className="pl-9 flex flex-col gap-1">
          <p className="text-sm" style={{ color: "#C75C5C" }}>
            ✗ Not quite. {attempts >= 2 ? `The answer is ${problem.a.replace(/\^/g, "^")}.` : "Try again, or check the hint."}
          </p>
          {!showHint && attempts < 2 && (
            <button
              onClick={() => setShowHint(true)}
              className="text-xs self-start underline"
              style={{ color: "#8C9AC2" }}
            >
              show hint
            </button>
          )}
        </div>
      )}
      {showHint && status !== "correct" && (
        <p className="text-xs pl-9 italic" style={{ color: "#8C9AC2" }}>{problem.hint}</p>
      )}
    </div>
  );
}

function DayPanel({ day }) {
  const Graph = day.graphMode === "tangent" ? TangentGraph : AreaGraph;
  return (
    <div className="flex flex-col gap-6">
      <div>
        <p className="text-xs uppercase tracking-widest font-semibold" style={{ color: "#E8A33D" }}>
          {day.eyebrow}
        </p>
        <h2 className="text-2xl mt-1" style={{ fontFamily: "Georgia, serif", color: "#F2EFE6" }}>
          {day.title}
        </h2>
        <p className="text-sm mt-3 leading-relaxed" style={{ color: "#B6C0DE" }}>
          {day.recap}
        </p>
      </div>

      <div className="flex justify-center py-2">
        <Graph funcKey={day.func} />
      </div>

      <div>
        <h3 className="text-sm uppercase tracking-wide font-semibold mb-3" style={{ color: "#8C9AC2" }}>
          Problem Set
        </h3>
        <div className="flex flex-col gap-3">
          {day.problems.map((p, i) => (
            <ProblemCard key={i} problem={p} index={i} />
          ))}
        </div>
      </div>
    </div>
  );
}

function CalculusMastery() {
  const [activeDay, setActiveDay] = useState(1);
  const day = DAYS.find((d) => d.id === activeDay);

  return (
    <div
      className="min-h-screen w-full flex flex-col items-center py-8 px-4"
      style={{ background: "#10172A", fontFamily: "system-ui, -apple-system, sans-serif" }}
    >
      <div className="w-full max-w-xl flex flex-col gap-6">
        <header className="text-center">
          <p className="text-xs uppercase tracking-[0.2em]" style={{ color: "#5C6A8C" }}>
            7-Day Sprint
          </p>
          <h1 className="text-3xl mt-1" style={{ fontFamily: "Georgia, serif", color: "#F2EFE6" }}>
            Derivatives → Integrals
          </h1>
        </header>

        <nav className="flex flex-wrap justify-center gap-2">
          {DAYS.map((d) => (
            <button
              key={d.id}
              onClick={() => setActiveDay(d.id)}
              className="text-xs font-mono rounded-full px-3 py-1.5 transition-colors"
              style={{
                background: activeDay === d.id ? "#E8A33D" : "#161E33",
                color: activeDay === d.id ? "#10172A" : "#8C9AC2",
                border: `1px solid ${activeDay === d.id ? "#E8A33D" : "#2A3550"}`,
              }}
            >
              Day {d.id}
            </button>
          ))}
        </nav>

        <main
          className="rounded-xl p-5"
          style={{ background: "#10172A", border: "1px solid #2A3550" }}
        >
          <DayPanel day={day} />
        </main>

        <footer className="text-center text-xs pb-4" style={{ color: "#5C6A8C" }}>
          Days 1–4 build derivative fluency. Days 5–7 cross into integrals via Riemann sums and the Fundamental Theorem.
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CalculusMastery />);
</script>

<script>
